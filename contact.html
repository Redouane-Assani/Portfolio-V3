<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="page-header">
        <span style="color:white; font-weight:bold;">CONTACT</span>
        <a href="index.html" class="home-btn">← Retour Accueil</a>
    </header>

    <main class="container">
        <h1 class="section-title">Me Contacter</h1>

        <div class="content-box">
            <form id="contact-form" onsubmit="sendMessage(event)">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">Nom :</label>
                    <input type="text" id="contact-name" name="name" required
                           style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; box-sizing:border-box;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">Sujet :</label>
                    <input type="text" id="contact-subject" name="subject"
                           style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; box-sizing:border-box;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">Message :</label>
                    <textarea id="contact-message" name="message" rows="5" required
                              style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; box-sizing:border-box;"></textarea>
                </div>

                <button type="submit" class="btn-download" style="border:none; cursor:pointer;">Envoyer</button>
            </form>
        </div>
    </main>

    <script>
        function sendMessage(e) {
            e.preventDefault();
            const p = ['redouane', 'assani', 'gmail', 'com'];
            const dest = p[0] + '.' + p[1] + '@' + p[2] + '.' + p[3];
            const name = document.getElementById('contact-name').value;
            const subject = document.getElementById('contact-subject').value || 'Contact via portfolio';
            const message = document.getElementById('contact-message').value;
            const body = 'Nom : ' + name + '\n\n' + message;
            window.location.href = 'mailto:' + dest
                + '?subject=' + encodeURIComponent(subject)
                + '&body=' + encodeURIComponent(body);
        }
    </script>
</body>
</html>
